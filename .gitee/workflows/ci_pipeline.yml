name: 🚀 PRO-Framework 全链路 Gitee Go 质量红线流水线

# 触发条件：当主分支有代码推送（push）时立即触发
on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 阶段一：接口自动化卡点测试
  api_automation_test:
    name: 🎯 接口自动化测试卡点
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出项目源码
        uses: actions/checkout@v2

      - name: 🐍 初始化 Python 3.12 环境
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: 📦 安装框架全量依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 执行接口自动化跑测
        run: |
          cd 1-API-Automation
          python -m pytest -vs tests/ --alluredir=allure-results

      - name: 📂 归档保存 Allure 原始凭证
        uses: actions/upload-artifact@v2
        with:
          name: api-allure-results
          path: 1-API-Automation/allure-results/

  # 阶段二：性能容量演练（接口通过后联动触发）
  performance_stress_test:
    name: 📈 性能专项压测演练
    needs: api_automation_test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出项目源码
        uses: actions/checkout@v2

      - name: 🐍 初始化 Python 环境
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: 📦 安装性能专项依赖
        run: |
          pip install locust pandas psutil

      - name: 📊 触发自动化无界面压测与自监控
        run: |
          cd 3-Performance-Testing
          python run_perf_test.py

      - name: 📂 归档保存性能 HTML 看板与监控报表
        uses: actions/upload-artifact@v2
        with:
          name: performance-reports
          path: |
            3-Performance-Testing/perf_report.html
            3-Performance-Testing/*_system_metrics.csv
