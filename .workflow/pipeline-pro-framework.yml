version: '1.0'
name: pipeline-pro-framework
displayName: PRO-Framework-CICD-Pipeline
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
        - master
stages:
  - name: stage-api
    displayName: API-Automation-Test
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@python
        name: api_test
        displayName: API-Automation-Test
        pythonVersion: '3.13'
        commands:
          - python -m pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple/
          - pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple/
          - cd 1-API-Automation
          - python -m pytest -vs tests/ --alluredir=allure-results
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./
        caches: []
        notify: []
        strategy:
          retry: '0'
  - name: stage-perf
    displayName: Performance-Stress-Test
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@python
        name: perf_test
        displayName: Performance-Stress-Test
        pythonVersion: '3.13'
        commands:
          # 1. 升级 pip 并安装所有性能测试所需的第三方库
          - python -m pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple/
          - pip install locust pandas psutil pytest allure-pytest -i https://mirrors.aliyun.com/pypi/simple/
          
          # 2. 切换到性能测试专用目录
           Chil-dir 切换目录
          - cd 3-Performance-Testing
          - export PATH=$PATH:$HOME/.local/bin
          
          # 3. 后台静默启动 Mock 后端服务器（利用 & 符号防止进程阻塞流水线）
          - python mock_server.py > mock.log 2>&1 &
          
          # 4. 强制等待 3 秒，确保 8080 端口完全被 Mock 服务拉起响应
          - sleep 3
          
          # 5. 执行结合了 Allure 报告看板的 Locust 压力测试
          - python -m pytest test_perf_bridge.py --alluredir=../allure-results
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./
        caches: []
        notify: []
        strategy:
          retry: '0'
